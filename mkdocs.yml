site_name: QEX QuantumDevOps
site_url: https://www.mkdocs.org/
site_description: Quantum DevOps @ QEX.
site_author: QEX

theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true
  locale: en
  analytics: {gtag: 'G-274394082'}
  highlightjs: true
  hljs_languages:
    - yaml
    - django

nav:
  - Home: index.md
  - Dev: dev/
  - Ops: ops/
plugins:
  - mkdocs-jupyter:
      execute: false
      include_requirejs: true
      custom_mathjax_url: "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_CHTML-full,Safe"
  - literate-nav:
      nav_file: README.md
      implicit_index: true